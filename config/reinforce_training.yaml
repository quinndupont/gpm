# Poet REINFORCE (Stage 2) — reward-weighted regression with KL penalty
# Runs after Stage 1 SFT; uses deterministic rhyme scorer as reward signal.

base_model: "meta-llama/Llama-3.1-8B-Instruct"
model_loading:
  quantization: "nf4"
  compute_dtype: "bfloat16"
  double_quant: true

lora:
  rank: 64
  alpha: 128
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  task_type: "CAUSAL_LM"

reinforce:
  num_completions: 4
  beta_kl: 0.1
  max_gen_tokens: 512
  temperature: 0.8
  top_p: 0.95

training:
  learning_rate: 1e-5
  warmup_ratio: 0.05
  num_epochs: 2
  per_device_batch_size: 1
  gradient_accumulation_steps: 8
  max_seq_length: 1024
  weight_decay: 0.01
  bf16: true
  max_grad_norm: 0.5

checkpointing:
  save_strategy: "epoch"
  save_path: "/vol/checkpoints/poet_reinforce/"
  save_total_limit: 2
