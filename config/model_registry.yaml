# Curated base models for educator/poet training
# Training: QLoRA NF4 on Modal A10G
# Inference: GGUF on Mac M4 24GB
#
# Fit guidance:
#   educator: Instruct models excel at critique, brief generation, structured output
#   poet: General/creative models often produce less formulaic verse; instruct works too

models:
  # Qwen3: native tool calling, thinking mode, 119-language support
  - hf_id: Qwen/Qwen3-8B
    short_name: qwen3-8b
    param_b: 8
    training_quant: nf4
    inference_quants: [Q4_K_M, Q5_K_M]
    recommended_inference_quant: Q4_K_M
    stop_tokens: ["<|im_end|>", "<|endoftext|>"]
    tool_calling: true
    educator_fit: recommended
    educator_note: Native tool calling; best fit for Socratic educator with request_poem
    poet_fit: good
    poet_note: Strong creative output with thinking mode

  - hf_id: Qwen/Qwen3-32B
    short_name: qwen3-32b
    param_b: 32
    training_quant: nf4
    inference_quants: [Q4_K_M, Q3_K_M]
    recommended_inference_quant: Q4_K_M
    stop_tokens: ["<|im_end|>", "<|endoftext|>"]
    tool_calling: true
    educator_fit: recommended
    educator_note: Highest quality Qwen3; native tool calling; swap needed for 24GB local
    poet_fit: recommended
    poet_note: Strong creative capacity at 32B

  - hf_id: Qwen/Qwen3-30B-A3B
    short_name: qwen3-30b-a3b
    param_b: 30
    training_quant: nf4
    inference_quants: [Q4_K_M, Q5_K_M]
    recommended_inference_quant: Q4_K_M
    stop_tokens: ["<|im_end|>", "<|endoftext|>"]
    tool_calling: true
    architecture: moe
    educator_fit: recommended
    educator_note: MoE with 3B active params; fast inference with tool calling
    poet_fit: good
    poet_note: MoE diversity; efficient for Modal GPU serving

