# Data generation: Anthropic for hard tasks, local for easier
# Hard tasks: critiques, comparisons, revision_briefs (Opus)
# Easier: briefs, autopsies, lessons (Sonnet or local)

# Backend: "bedrock" (preferred when AWS creds available) or "anthropic"
# Auto-detected based on AWS_ACCESS_KEY_ID, AWS_PROFILE, or ~/.aws/credentials
# Override with USE_BEDROCK=true/false env var
backend:
  preferred: bedrock
  aws_region: us-east-1

# Opus: 50 total, only hardest (rhyme poem generation). Sonnet: 400. Beyond that → local.
quotas:
  opus_max: 50
  sonnet_max: 400

local:
  backend: ollama
  model: llama3.1:8b

# Contrastive balancing: bad poems ~114, good ~34k
# Bad: use in comparison + critique + autopsy (each 3x)
good_critique_subsample: 200
revision_brief_count: 50
