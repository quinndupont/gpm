# SRPO Training Data Generation Config
# Generates trajectories: (prompt, draft_0, critique, draft_1)

source_data: "data/poet_training/train.jsonl"
output_dir: "data/srpo_training"
output_filename: "trajectories.jsonl"

draft_generation:
  # SFT checkpoint to generate initial drafts
  checkpoint: "/vol/checkpoints/poet/final"
  temperature: 0.8
  top_p: 0.95
  max_tokens: 512

critique_generation:
  # Use local educator model (faster) or Claude API (higher quality)
  use_educator: true
  educator_checkpoint: "/vol/checkpoints/educator/final"
  # Always include deterministic rhyme analysis in critique
  include_rhyme_analysis: true
  temperature: 0.3
  max_tokens: 600

revision_generation:
  # Claude generates gold-standard revisions
  model: "claude-sonnet-4-20250514"
  temperature: 0.7
  # Generate multiple candidates, keep best by reward
  candidates_per_draft: 2
  max_tokens: 600

filtering:
  # Minimum reward improvement to keep trajectory
  min_improvement: 0.05
  # Minimum absolute quality of revised draft
  min_draft_1_score: 0.5
  # Maximum trajectories to generate
  max_trajectories: 5000

rate_limits:
  # Claude API rate limiting
  requests_per_minute: 50
  # Cost cap (approximate)
  max_cost_usd: 100.0
