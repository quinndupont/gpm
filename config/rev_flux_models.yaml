# RevFlux model configs for comparison.
# educator/poet: "gguf" = use inference_config.yaml; "gguf:path" = explicit GGUF; "ollama:tag" = Ollama; "bedrock:model-id" = AWS Bedrock
# revisions: per-model sweep (vanilla: rev0+rev1 for change_pcts; fine-tuned: full sweep)
# test_models: model IDs to run when --test (default when no --models given)
#
# Bedrock inference profiles (required for on-demand throughput):
#   Anthropic: us.anthropic.claude-opus-4-6-v1:0, us.anthropic.claude-sonnet-4-6-v1:0
#   Meta: us.meta.llama4-maverick-17b-instruct-v1:0
#   Qwen: us.qwen.qwen3-32b-v1:0
# Requires AWS credentials configured (aws configure) and boto3 installed (pip install boto3)
test_models:
  - trained-llama3.1-8b
  - qwen2.5-7b-vanilla
  - llama3.1-8b-vanilla
  - command-r7b-vanilla
  - qwen3.5-9b-claude-opus-vanilla
  - claude-sonnet-4  # Frontier model for comparison

models:
  # --- Trained/Fine-tuned models ---
  - id: trained-llama3.1-8b
    label: "Trained Llama 3.1 8B Poet (Q4)"
    educator: gguf:./models/llama3.1-8b-poet-Q4_K_M-trained.gguf
    poet: gguf:./models/llama3.1-8b-poet-Q4_K_M-trained.gguf
    revisions: [0, 1, 3]

  - id: trained-llama3.1-8b-q6
    label: "Trained Llama 3.1 8B Poet (Q6)"
    educator: gguf:./models/llama3.1-8b-educator-Q6_K-trained.gguf
    poet: gguf:./models/llama3.1-8b-educator-Q6_K-trained.gguf
    revisions: [0, 1, 3]

  # --- Vanilla baselines (rev0+rev1: same model as educator+poet for change_pcts) ---
  - id: qwen2.5-7b-vanilla
    label: "Vanilla Qwen 2.5 7B"
    educator: ollama:qwen2.5:7b-instruct
    poet: ollama:qwen2.5:7b-instruct
    revisions: [0, 1, 3]

  - id: llama3.1-8b-vanilla
    label: "Vanilla Llama 3.1 8B"
    educator: ollama:llama3.1:8b
    poet: ollama:llama3.1:8b
    revisions: [0, 1, 3]

  - id: command-r7b-vanilla
    label: "Vanilla Command R7B"
    educator: ollama:command-r7b:7b
    poet: ollama:command-r7b:7b
    revisions: [0, 1, 3]

  - id: qwen3.5-9b-claude-opus-vanilla
    label: "Vanilla Qwen 3.5 9B (Claude Opus Distilled)"
    educator: ollama:qwen3.5-9b-claude-opus:9b-q4
    poet: ollama:qwen3.5-9b-claude-opus:9b-q4
    revisions: [0, 1, 3]

  # Cohere GGUF has Jinja2 template incompatibility with llama.cpp; use command-r7b-vanilla (Ollama) instead

  # --- Frontier models via AWS Bedrock ---
  # NOTE: These models require active access in AWS Bedrock Console
  # Go to Bedrock Console > Model access > Modify model access to enable

  # Anthropic Claude models
  - id: claude-opus-4
    label: "Claude Opus 4.6 (Bedrock)"
    educator: bedrock:us.anthropic.claude-opus-4-6-v1
    poet: bedrock:us.anthropic.claude-opus-4-6-v1
    revisions: [0, 1, 3]

  - id: claude-sonnet-4
    label: "Claude Sonnet 4.6 (Bedrock)"
    educator: bedrock:us.anthropic.claude-sonnet-4-6
    poet: bedrock:us.anthropic.claude-sonnet-4-6
    revisions: [0, 1, 3]

  # Meta Llama models
  - id: llama4-maverick
    label: "Llama 4 Maverick 17B (Bedrock)"
    educator: bedrock:us.meta.llama4-maverick-17b-instruct-v1:0
    poet: bedrock:us.meta.llama4-maverick-17b-instruct-v1:0
    revisions: [0, 1, 3]

  # Qwen models
  - id: qwen3-32b
    label: "Qwen 3 32B (Bedrock)"
    educator: bedrock:qwen.qwen3-32b-v1:0
    poet: bedrock:qwen.qwen3-32b-v1:0
    revisions: [0, 1, 3]

  # Additional Frontier Models
  - id: glm4.7-v1
    label: "GLM 4.7 v1 (Bedrock)"
    educator: bedrock:zai.glm-4.7
    poet: bedrock:zai.glm-4.7
    revisions: [0, 1, 3]

  - id: kimi-k2.5
    label: "Kimi K2.5 (Bedrock)"
    educator: bedrock:moonshotai.kimi-k2.5
    poet: bedrock:moonshotai.kimi-k2.5
    revisions: [0, 1, 3]

  - id: minimax-m2.1
    label: "MiniMax M2.1 (Bedrock)"
    educator: bedrock:minimax.minimax-m2.1
    poet: bedrock:minimax.minimax-m2.1
    revisions: [0, 1, 3]

  - id: nova-pro
    label: "Nova Pro (Bedrock)"
    educator: bedrock:amazon.nova-pro-v1:0
    poet: bedrock:amazon.nova-pro-v1:0
    revisions: [0, 1, 3]

  # Additional Open Models
  - id: gpt-oss-120b
    label: "GPT OSS 120B (Bedrock)"
    educator: bedrock:openai.gpt-oss-120b-1:0
    poet: bedrock:openai.gpt-oss-120b-1:0
    revisions: [0, 1, 3]

  - id: nemotron-nano-30b
    label: "Nemotron Nano 3 30B (Bedrock)"
    educator: bedrock:nvidia.nemotron-nano-3-30b
    poet: bedrock:nvidia.nemotron-nano-3-30b
    revisions: [0, 1, 3]

  - id: gemma3-27b
    label: "Gemma 3 27B PT (Bedrock)"
    educator: bedrock:google.gemma-3-27b-it
    poet: bedrock:google.gemma-3-27b-it
    revisions: [0, 1, 3]

  - id: command-r-plus
    label: "Command R+ (Bedrock)"
    educator: bedrock:cohere.command-r-plus-v1:0
    poet: bedrock:cohere.command-r-plus-v1:0
    revisions: [0, 1, 3]
