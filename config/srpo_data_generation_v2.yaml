# SRPO Training Data Generation Config v2
# Hybrid strategy: variance (70%) + model-gap (30%)
# Generates trajectories: (prompt, draft_0, critique, draft_1)

# Multi-dimensional reward scoring (set false for rhyme-only, backward compatible)
use_educator_scoring: false

educator_scoring:
  model_path: "models/llama3.1-8b-educator-Q4_K_M.gguf"
  weights:
    imagery_clarity: 0.20
    originality: 0.20
    sentiment_authenticity: 0.20
    form_adherence: 0.25
    voice_distinctiveness: 0.15
  temperature: 0.1
  max_tokens: 200

source_data: "data/poet_training/train.jsonl"
output_dir: "data/srpo_training"
output_filename: "trajectories_v2.jsonl"

# Strategy: "variance", "model_gap", or "hybrid"
trajectory_strategy: "hybrid"

hybrid:
  variance_ratio: 0.7
  model_gap_ratio: 0.3

# Variance strategy: generate N candidates, pick best/worst
variance:
  num_candidates: 5
  min_score_gap: 0.15
  model:
    backend: "ollama"
    model: "llama3.1:8b"
    temperature: 0.9
    max_tokens: 512

# Model-gap strategy: weak model for rejected, strong for chosen
model_gap:
  rejected_model:
    backend: "ollama"
    model: "llama3.1:8b"
    temperature: 0.8
    max_tokens: 512
  # Rotate through these models for cost distribution and diversity
  chosen_models:
    - backend: "bedrock"
      model: "google.gemma-3-27b-it"
      temperature: 0.7
      max_tokens: 600
    - backend: "bedrock"
      model: "zai.glm-4.7"
      temperature: 0.7
      max_tokens: 600
    - backend: "bedrock"
      model: "us.anthropic.claude-sonnet-4-6"
      temperature: 0.7
      max_tokens: 600

# Critique generation (shared by all strategies)
critique:
  backend: "bedrock"
  model: "us.meta.llama4-maverick-17b-instruct-v1:0"
  include_rhyme_analysis: true
  temperature: 0.3
  max_tokens: 600

# Filtering thresholds
filtering:
  min_improvement: 0.05  # Lowered from 0.10 to accept smaller gains
  min_chosen_score: 0.55
  max_trajectories: 5000

# Rate limiting
rate_limits:
  requests_per_minute: 100
  max_tokens_per_minute: 50000
  max_cost_usd: 100.0
