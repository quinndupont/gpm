# SRPO Training Data Generation Config v2
# Educator for critique only; rhyme-only rewards; shared frontier rotation
# Generates trajectories: (prompt, draft_0, critique, draft_1)

use_educator_scoring: false
use_educator_critique: true

educator_critique:
  model_path: "models/llama3.1-8b-educator-Q6_K-trained.gguf"
  include_rhyme_analysis: true
  temperature: 0.3
  max_tokens: 600

source_data: "data/poet_training/train.jsonl"
output_dir: "data/srpo_training"
output_filename: "trajectories_v2.jsonl"

trajectory_strategy: "hybrid"

hybrid:
  variance_ratio: 0.3
  model_gap_ratio: 0.7

# Shared by variance (revision) and model_gap (chosen)
frontier_models:
  - backend: "bedrock"
    model: "google.gemma-3-27b-it"
    temperature: 0.7
    max_tokens: 600
  - backend: "bedrock"
    model: "zai.glm-4.7"
    temperature: 0.7
    max_tokens: 600
  - backend: "bedrock"
    model: "us.anthropic.claude-sonnet-4-6"
    temperature: 0.7
    max_tokens: 600

# Variance: poet N samples → pick worst → educator critique → frontier revise
variance:
  num_candidates: 5
  min_score_gap: 0.10
  model:
    backend: "ollama"
    model: "llama3.1:8b"
    temperature: 0.9
    max_tokens: 512

# Model-gap: weak model draft_0 → educator critique → frontier revise
model_gap:
  rejected_model:
    backend: "ollama"
    model: "llama3.1:8b"
    temperature: 0.8
    max_tokens: 512

# Fallback when use_educator_critique: false (Bedrock for critique)
critique:
  backend: "bedrock"
  model: "us.meta.llama4-maverick-17b-instruct-v1:0"
  include_rhyme_analysis: true
  temperature: 0.3
  max_tokens: 600

filtering:
  min_improvement: 0.05
  min_chosen_score: 0.55
  max_trajectories: 5000

rate_limits:
  requests_per_minute: 100
  max_tokens_per_minute: 50000
  max_cost_usd: 100.0
